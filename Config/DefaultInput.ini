; --- Silkroad-style controls ---
; Left click: target enemy (single) or target+attack (double) or move (ground)
+ActionMappings=(ActionName="LeftClick",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=LeftMouseButton)
; Right click: camera orbit (hold)
+ActionMappings=(ActionName="RightClick",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=RightMouseButton)
; Tab: cycle nearest hostile target
+ActionMappings=(ActionName="CycleTarget",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Tab)
; Escape: clear target
+ActionMappings=(ActionName="ClearTarget",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Escape)
; Hotbar slots (keys 1-9) - Silkroad-style ability activation
+ActionMappings=(ActionName="HotbarSlot1",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=One)
+ActionMappings=(ActionName="HotbarSlot2",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Two)
+ActionMappings=(ActionName="HotbarSlot3",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Three)
+ActionMappings=(ActionName="HotbarSlot4",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Four)
+ActionMappings=(ActionName="HotbarSlot5",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Five)
+ActionMappings=(ActionName="HotbarSlot6",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Six)
+ActionMappings=(ActionName="HotbarSlot7",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Seven)
+ActionMappings=(ActionName="HotbarSlot8",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Eight)
+ActionMappings=(ActionName="HotbarSlot9",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Nine)
